<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Modern Blogging</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    
    <!-- Navbar -->
    <nav class="navbar glass">
        <div class="nav-container">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span>Nexus</span>
            </div>
            <button id="newPostBtn" class="btn primary-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Create Post
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <header class="page-header">
            <h1>Discover Stories</h1>
            <p>Read the latest insights, tutorials, and stories from our community.</p>
        </header>

        <div id="emptyState" class="empty-state hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"></path><polygon points="18 2 22 6 12 16 8 16 8 12 18 2"></polygon></svg>
            <h2>No posts yet</h2>
            <p>Be the first to share your thoughts with the world.</p>
            <button class="btn secondary-btn" onclick="document.getElementById('newPostBtn').click()">Write your first post</button>
        </div>

        <div id="blogGrid" class="blog-grid">
            <!-- Blog Cards will be dynamically injected here -->
        </div>
    </main>

    <!-- Post Editor Modal -->
    <div id="editorModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Post</h2>
                <button class="icon-btn close-modal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <form id="postForm" class="editor-form">
                <input type="hidden" id="postId">
                
                <div class="form-group">
                    <input type="text" id="postTitle" placeholder="Post Title..." required autocomplete="off">
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <select id="postCategory" required>
                            <option value="" disabled selected>Select Category</option>
                            <option value="Technology">Technology</option>
                            <option value="Design">Design</option>
                            <option value="Lifestyle">Lifestyle</option>
                            <option value="Development">Development</option>
                        </select>
                    </div>
                    <div class="form-group flex-2">
                        <input type="url" id="postImage" placeholder="Cover Image URL (e.g., https://unsplash.com/...)" required autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <textarea id="postContent" placeholder="Write your story here..." required></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn text-btn close-modal">Cancel</button>
                    <button type="submit" class="btn primary-btn" id="savePostBtn">Publish Post</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Article View Modal -->
    <div id="articleModal" class="modal hidden">
        <div class="modal-backdrop article-backdrop"></div>
        <div class="article-content glass">
            <button class="icon-btn close-article floating-close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div id="articleView" class="article-body">
                <!-- Article content injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
